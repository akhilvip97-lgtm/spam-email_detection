<!DOCTYPE html>
<html>
<head>
    <title>Spam Detector</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 420px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
        }

        p {
            color: #777;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            height: 120px;
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            resize: none;
            font-size: 14px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .loading {
            font-size: 14px;
            color: #555;
        }

    </style>
</head>

<body>

<div class="container">
    <h1>📩 Spam Detector</h1>
    <p>Check whether a message is spam or not</p>

    <textarea id="emailText" placeholder="Type your message here..."></textarea>

    <button onclick="checkSpam()">Check Message</button>

    <div id="result"></div>
</div>

<script>
function checkSpam() {
    let text = document.getElementById("emailText").value;
    let resultDiv = document.getElementById("result");

    if (text.trim() === "") {
        alert("Please enter a message!");
        return;
    }

    resultDiv.innerHTML = "<span class='loading'>⏳ Checking...</span>";

    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: text })
    })
    .then(res => res.json())
    .then(data => {
        if (data.prediction === 1) {
            resultDiv.innerHTML = "🚫 <span style='color:red;'>Spam Message</span>";
        } else {
            resultDiv.innerHTML = "✅ <span style='color:green;'>Not Spam</span>";
        }
    })
    .catch(() => {
        resultDiv.innerHTML = "⚠ Error connecting to server";
    });
}
</script>

</body>
</html>
